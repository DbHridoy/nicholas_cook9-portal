<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="700" viewBox="0 0 1800 700">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B5CFF"/>
      <stop offset="100%" stop-color="#0072FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#001A44" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1800" height="700" fill="#ffffff"/>

  <!-- Icon -->
  <g transform="translate(125 125)" filter="url(#softShadow)">
    <!-- Navy ledger/L mark -->
    <path d="M70 0
             H205
             A35 35 0 0 1 240 35
             V300
             H495
             A35 35 0 0 1 530 335
             V430
             A35 35 0 0 1 495 465
             H70
             A70 70 0 0 1 0 395
             V70
             A70 70 0 0 1 70 0 Z"
          fill="#061C44"/>
    <!-- white cutout -->
    <path d="M240 0 H395 A70 70 0 0 1 465 70 V205 A35 35 0 0 1 430 240 H275 A35 35 0 0 1 240 205 Z" fill="#ffffff"/>
    <!-- blue block -->
    <path d="M320 0 H430 A70 70 0 0 1 500 70 V180 A60 60 0 0 1 440 240 H320 A35 35 0 0 1 285 205 V35 A35 35 0 0 1 320 0 Z" fill="url(#blueGrad)"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(710 165)">
    <text x="0" y="190" font-family="Montserrat, Arial, Helvetica, sans-serif" font-weight="800" font-size="205" letter-spacing="-9" fill="#061C44">Ledger</text>
    <g transform="translate(2 285)">
      <line x1="0" y1="28" x2="140" y2="28" stroke="#0B5CFF" stroke-width="10"/>
      <text x="210" y="55" font-family="Montserrat, Arial, Helvetica, sans-serif" font-weight="500" font-size="72" letter-spacing="42" fill="#5E697C">GROUP</text>
      <line x1="790" y1="28" x2="930" y2="28" stroke="#0B5CFF" stroke-width="10"/>
    </g>
  </g>
</svg>
